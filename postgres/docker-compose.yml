# docker-compose.yml

version: '3.9'

services:
  postgres:
    image: postgres:16

    container_name: postgres_db

    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: fastapi_db

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: